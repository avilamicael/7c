<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagrama — Banco de Dados</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f7c06a;
    --accent3: #6af7c0;
    --accent4: #f76a9a;
    --accent5: #6aaaf7;
    --accent6: #f7a06a;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --pk: #f7c06a;
    --fk: #6af7c0;
    --field: #b0b0cc;
  }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .badge {
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 4px;
  }

  .zoom-controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .zoom-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }

  .zoom-btn:hover { border-color: var(--accent); background: rgba(124,106,247,0.1); }

  .zoom-label {
    font-size: 0.72rem;
    color: var(--muted);
    min-width: 46px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
  }

  .legend {
    position: relative;
    z-index: 10;
    padding: 10px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    font-size: 0.7rem;
    color: var(--muted);
    flex-wrap: wrap;
    background: rgba(10,10,15,0.9);
    flex-shrink: 0;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .viewport {
    position: relative;
    flex: 1;
    overflow: hidden;
    cursor: grab;
  }

  .viewport:active { cursor: grabbing; }

  .canvas {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    transition: none;
  }

  svg.connections {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
  }

  .table {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-width: 240px;
    z-index: 5;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
    cursor: move;
    user-select: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .table:hover {
    border-color: var(--accent);
    box-shadow: 0 0 30px rgba(124,106,247,0.15);
  }

  .table.dragging {
    border-color: var(--accent);
    box-shadow: 0 0 40px rgba(124,106,247,0.25);
    z-index: 100;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .table-header {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 9px;
    border-radius: 9px 9px 0 0;
  }

  .table-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .table-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.83rem;
    letter-spacing: 0.02em;
  }

  .table-app {
    margin-left: auto;
    font-size: 0.62rem;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .table-fields { padding: 6px 0; }

  .field {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 14px;
    font-size: 0.7rem;
    transition: background 0.15s;
  }

  .field:hover { background: rgba(255,255,255,0.03); }

  .field-badge {
    font-size: 0.58rem;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 600;
    min-width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .badge-pk { background: rgba(247,192,106,0.15); color: var(--pk); }
  .badge-fk { background: rgba(106,247,192,0.15); color: var(--fk); }
  .badge-ui { background: rgba(124,106,247,0.15); color: var(--accent); }
  .badge-empty { min-width: 22px; }

  .field-name { color: var(--field); flex: 1; }
  .field-type { color: var(--muted); font-size: 0.63rem; white-space: nowrap; }

  .field-req { font-size: 0.6rem; font-weight: 700; min-width: 12px; text-align: center; flex-shrink: 0; }
  .req { color: #f76a6a; }
  .opt { color: var(--muted); }

  .field-divider { height: 1px; background: var(--border); margin: 3px 14px; opacity: 0.5; }

  .conn-line { fill: none; stroke-width: 1.5; opacity: 0.5; }

  /* Themes */
  .t-empresa .table-icon        { background: var(--accent); }
  .t-empresa .table-name        { color: var(--accent); }
  .t-empresa .table-header      { background: rgba(124,106,247,0.08); }

  .t-personalizacao .table-icon   { background: var(--accent4); }
  .t-personalizacao .table-name   { color: var(--accent4); }
  .t-personalizacao .table-header { background: rgba(247,106,154,0.06); }

  .t-creditoextra .table-icon   { background: var(--accent2); }
  .t-creditoextra .table-name   { color: var(--accent2); }
  .t-creditoextra .table-header { background: rgba(247,192,106,0.06); }

  .t-usuario .table-icon   { background: var(--accent3); }
  .t-usuario .table-name   { color: var(--accent3); }
  .t-usuario .table-header { background: rgba(106,247,192,0.08); }

  .t-usuarioempresa .table-icon   { background: #a78bfa; }
  .t-usuarioempresa .table-name   { color: #a78bfa; }
  .t-usuarioempresa .table-header { background: rgba(167,139,250,0.07); }

  .t-cliente .table-icon   { background: var(--accent5); }
  .t-cliente .table-name   { color: var(--accent5); }
  .t-cliente .table-header { background: rgba(106,170,247,0.08); }

  .t-clientedocumento .table-icon   { background: var(--accent6); }
  .t-clientedocumento .table-name   { color: var(--accent6); }
  .t-clientedocumento .table-header { background: rgba(247,160,106,0.07); }

  .t-clientetelefone .table-icon   { background: #c4b5fd; }
  .t-clientetelefone .table-name   { color: #c4b5fd; }
  .t-clientetelefone .table-header { background: rgba(196,181,253,0.06); }

  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-size: 0.8rem;
    color: var(--muted);
    gap: 10px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .page-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div> Carregando schema…</div>

<div class="page-wrap">
  <header>
    <h1>Diagrama do Banco de Dados</h1>
    <span class="badge" id="badge-tables">— tabelas</span>
    <span class="badge">Django ORM</span>
    <span class="badge">PostgreSQL</span>
    <div class="zoom-controls">
      <button class="zoom-btn" id="btn-fit" title="Ajustar à tela">⊡</button>
      <button class="zoom-btn" id="btn-minus" title="Diminuir (-)">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" id="btn-plus" title="Aumentar (+)">+</button>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--pk)"></div> PK — Chave Primária</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--fk)"></div> FK — Chave Estrangeira</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> UI — Único + Index</div>
    <div class="legend-item"><span style="color:#f76a6a;font-weight:700">*</span>&nbsp;Obrigatório</div>
    <div class="legend-item"><span style="color:#3a3a5a">○</span>&nbsp;Opcional</div>
    <div class="legend-item" style="margin-left:auto;font-size:0.68rem">Scroll para zoom · Arraste canvas para mover · Arraste tabela para reposicionar</div>
  </div>

  <div class="viewport" id="viewport">
    <div class="canvas" id="canvas">
      <svg class="connections" id="svg"></svg>
    </div>
  </div>
</div>

<script>
const ZOOM_MIN = 0.2;
const ZOOM_MAX = 2.0;
const ZOOM_STEP = 0.1;

let schema = null;
let zoom = 1;
let panX = 0, panY = 0;

// Pan state
let isPanning = false;
let panStartX = 0, panStartY = 0;
let panOriginX = 0, panOriginY = 0;

// Drag table state
let draggingTable = null;
let dragOffX = 0, dragOffY = 0;

const canvas  = document.getElementById('canvas');
const viewport = document.getElementById('viewport');
const svgEl   = document.getElementById('svg');

// ── Render tables ─────────────────────────────────────────────
function renderTables(tables) {
  tables.forEach(t => {
    const el = document.createElement('div');
    el.className = `table ${t.theme}`;
    el.id = t.id;
    el.style.left  = t.x + 'px';
    el.style.top   = t.y + 'px';
    el.style.animationDelay = t.delay + 's';

    let fieldsHTML = '';
    t.fields.forEach(f => {
      if (f.divider) {
        fieldsHTML += `<div class="field-divider"></div>`;
        return;
      }
      const badgeClass = f.badge ? `badge-${f.badge}` : 'badge-empty';
      const badgeText  = f.badge ? f.badge.toUpperCase() : '';
      const reqClass   = f.required ? 'req' : 'opt';
      const reqChar    = f.required ? '*' : '○';
      fieldsHTML += `
        <div class="field">
          <span class="field-badge ${badgeClass}">${badgeText}</span>
          <span class="field-req ${reqClass}">${reqChar}</span>
          <span class="field-name">${f.name}</span>
          <span class="field-type">${f.type}</span>
        </div>`;
    });

    el.innerHTML = `
      <div class="table-header">
        <div class="table-icon"></div>
        <span class="table-name">${t.name}</span>
        <span class="table-app">${t.app}</span>
      </div>
      <div class="table-fields">${fieldsHTML}</div>`;

    // Table drag
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      draggingTable = el;
      const rect = el.getBoundingClientRect();
      dragOffX = (e.clientX - rect.left) / zoom;
      dragOffY = (e.clientY - rect.top)  / zoom;
      el.classList.add('dragging');
    });

    canvas.appendChild(el);
  });
}

// ── Connections ───────────────────────────────────────────────
function getEdge(a, b) {
  const ax = a.left + a.w / 2, ay = a.top + a.h / 2;
  const bx = b.left + b.w / 2, by = b.top + b.h / 2;
  if (Math.abs(ax - bx) > Math.abs(ay - by)) {
    return ax < bx
      ? { x1: a.left + a.w, y1: ay, x2: b.left, y2: by }
      : { x1: a.left, y1: ay, x2: b.left + b.w, y2: by };
  } else {
    return ay < by
      ? { x1: ax, y1: a.top + a.h, x2: bx, y2: b.top }
      : { x1: ax, y1: a.top, x2: bx, y2: b.top + b.h };
  }
}

function tableRect(el) {
  const canvasRect = canvas.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  return {
    left: (elRect.left - canvasRect.left) / zoom,
    top:  (elRect.top  - canvasRect.top)  / zoom,
    w:    elRect.width  / zoom,
    h:    elRect.height / zoom,
  };
}

function drawConnections() {
  if (!schema) return;
  svgEl.innerHTML = '';

  // Compute canvas logical size for SVG
  const w = canvas.scrollWidth / zoom;
  const h = canvas.scrollHeight / zoom;
  svgEl.setAttribute('width',  w);
  svgEl.setAttribute('height', h);

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  schema.connections.forEach((c, i) => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', `arrow${i}`);
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '8');
    marker.setAttribute('refX', '6');
    marker.setAttribute('refY', '3');
    marker.setAttribute('orient', 'auto');
    const mpath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    mpath.setAttribute('d', 'M0,0 L0,6 L8,3 z');
    mpath.setAttribute('fill', c.color);
    mpath.setAttribute('opacity', '0.6');
    marker.appendChild(mpath);
    defs.appendChild(marker);
  });
  svgEl.appendChild(defs);

  schema.connections.forEach((c, i) => {
    const fromEl = document.getElementById(c.from);
    const toEl   = document.getElementById(c.to);
    if (!fromEl || !toEl) return;

    const a = tableRect(fromEl);
    const b = tableRect(toEl);
    const p = getEdge(a, b);

    const dx = Math.abs(p.x2 - p.x1) * 0.5;
    const cx1 = p.x1 + (p.x2 > p.x1 ? dx : -dx);
    const cx2 = p.x2 + (p.x2 > p.x1 ? -dx : dx);
    const d   = `M ${p.x1} ${p.y1} C ${cx1} ${p.y1}, ${cx2} ${p.y2}, ${p.x2} ${p.y2}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'conn-line');
    path.setAttribute('stroke', c.color);
    path.setAttribute('marker-end', `url(#arrow${i})`);
    svgEl.appendChild(path);

    const mx = (p.x1 + p.x2) / 2;
    const my = (p.y1 + p.y2) / 2;

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', mx - 16); rect.setAttribute('y', my - 9);
    rect.setAttribute('width', 32);  rect.setAttribute('height', 16);
    rect.setAttribute('rx', 4);
    rect.setAttribute('fill', '#111118');
    rect.setAttribute('stroke', c.color);
    rect.setAttribute('stroke-opacity', '0.3');
    rect.setAttribute('stroke-width', '1');
    svgEl.appendChild(rect);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', mx); text.setAttribute('y', my + 4);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-family', 'JetBrains Mono, monospace');
    text.setAttribute('font-size', '9');
    text.setAttribute('fill', c.color);
    text.setAttribute('opacity', '0.8');
    text.textContent = c.label;
    svgEl.appendChild(text);
  });
}

// ── Zoom ──────────────────────────────────────────────────────
function applyZoom(newZoom, originX, originY) {
  newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  if (newZoom === zoom) return;

  // Zoom toward origin point (viewport coords)
  const vr = viewport.getBoundingClientRect();
  const ox = (originX ?? vr.width  / 2);
  const oy = (originY ?? vr.height / 2);

  panX = ox - (ox - panX) * (newZoom / zoom);
  panY = oy - (oy - panY) * (newZoom / zoom);
  zoom = newZoom;

  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  drawConnections();
}

function fitToScreen() {
  if (!schema || !schema.tables.length) return;

  // Find bounding box of all tables
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  schema.tables.forEach(t => {
    const el = document.getElementById(t.id);
    if (!el) return;
    const x = parseFloat(el.style.left);
    const y = parseFloat(el.style.top);
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    minX = Math.min(minX, x);
    minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w);
    maxY = Math.max(maxY, y + h);
  });

  const pad    = 60;
  const cw     = maxX - minX + pad * 2;
  const ch     = maxY - minY + pad * 2;
  const vr     = viewport.getBoundingClientRect();
  const scaleX = vr.width  / cw;
  const scaleY = vr.height / ch;
  const newZoom = Math.min(scaleX, scaleY, ZOOM_MAX);

  zoom = newZoom;
  panX = -minX * zoom + pad * zoom + (vr.width  - cw * zoom) / 2;
  panY = -minY * zoom + pad * zoom + (vr.height - ch * zoom) / 2;

  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  drawConnections();
}

// ── Event listeners ───────────────────────────────────────────
document.getElementById('btn-plus').addEventListener('click', () => applyZoom(zoom + ZOOM_STEP));
document.getElementById('btn-minus').addEventListener('click', () => applyZoom(zoom - ZOOM_STEP));
document.getElementById('btn-fit').addEventListener('click', fitToScreen);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '+' || e.key === '=') applyZoom(zoom + ZOOM_STEP);
  if (e.key === '-')                  applyZoom(zoom - ZOOM_STEP);
  if (e.key === '0')                  fitToScreen();
});

// Scroll to zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const vr = viewport.getBoundingClientRect();
  const ox = e.clientX - vr.left;
  const oy = e.clientY - vr.top;
  const delta = e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP;
  applyZoom(zoom + delta, ox, oy);
}, { passive: false });

// Pan canvas
viewport.addEventListener('mousedown', e => {
  if (draggingTable) return;
  isPanning = true;
  panStartX  = e.clientX;
  panStartY  = e.clientY;
  panOriginX = panX;
  panOriginY = panY;
});

document.addEventListener('mousemove', e => {
  if (draggingTable) {
    const cr = canvas.getBoundingClientRect();
    const x  = (e.clientX - cr.left) / zoom - dragOffX;
    const y  = (e.clientY - cr.top)  / zoom - dragOffY;
    draggingTable.style.left = x + 'px';
    draggingTable.style.top  = y + 'px';
    drawConnections();
    return;
  }

  if (isPanning) {
    panX = panOriginX + (e.clientX - panStartX);
    panY = panOriginY + (e.clientY - panStartY);
    canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    drawConnections();
  }
});

document.addEventListener('mouseup', () => {
  if (draggingTable) draggingTable.classList.remove('dragging');
  draggingTable = null;
  isPanning = false;
});

// ── Schema inline ─────────────────────────────────────────────
const SCHEMA = {
  "tables": [
    {
      "id": "t-usuario", "name": "Usuario", "app": "usuarios", "theme": "t-usuario",
      "x": 60, "y": 60, "delay": 0.1,
      "fields": [
        { "badge": "pk", "required": true,  "name": "id",               "type": "BigInt" },
        { "badge": "ui", "required": true,  "name": "public_id",        "type": "UUID" },
        { "divider": true },
        { "badge": "ui", "required": true,  "name": "email",            "type": "Email" },
        {                 "required": true,  "name": "nome",             "type": "Char(255)" },
        {                 "required": false, "name": "telefone",         "type": "Char(11)" },
        { "divider": true },
        {                 "required": true,  "name": "is_active",        "type": "Bool" },
        {                 "required": true,  "name": "is_staff",         "type": "Bool" },
        { "divider": true },
        {                 "required": true,  "name": "date_joined",      "type": "DateTime" },
        {                 "required": true,  "name": "data_atualizacao", "type": "DateTime" }
      ]
    },
    {
      "id": "t-empresa", "name": "Empresa", "app": "empresas", "theme": "t-empresa",
      "x": 380, "y": 60, "delay": 0.15,
